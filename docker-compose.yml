version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# CDC Pipeline - Fault-Tolerant Change Data Capture with Schema Evolution
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: UTC

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cdc-mysql
    restart: unless-stopped
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-debezium}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dbzpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-row-image=FULL
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --default-authentication-plugin=mysql_native_password
      --innodb_buffer_pool_size=512M
      --max_connections=200
      --connect_timeout=60
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "${MYSQL_USER:-debezium}", "-p${MYSQL_PASSWORD:-dbzpassword}"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── Zookeeper ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: cdc-zookeeper
    restart: unless-stopped
    environment:
      <<: *common-env
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms128M"
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=*"
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: cdc-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      <<: *common-env
      KAFKA_BROKER_ID: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL",
             "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Kafka Connect + Debezium ──────────────────────────────────────────────
  connect:
    image: debezium/connect:2.5
    container_name: cdc-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      <<: *common-env
      BOOTSTRAP_SERVERS: ${CONNECT_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      GROUP_ID: ${CONNECT_GROUP_ID:-cdc-connect-group}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_STORAGE_TOPIC:-connect-configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_STORAGE_TOPIC:-connect-offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_STORAGE_TOPIC:-connect-status}
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "true"
    ports:
      - "${CONNECT_REST_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL",
             "curl -sf http://localhost:8083/connectors > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  # ── CDC Processor ─────────────────────────────────────────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: cdc-processor
    restart: unless-stopped
    depends_on:
      connect:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      PROCESSOR_KAFKA_TOPIC_PREFIX: ${PROCESSOR_KAFKA_TOPIC_PREFIX:-ecommerce_server.ecommerce}
      PROCESSOR_DATA_LAKE_PATH: ${PROCESSOR_DATA_LAKE_PATH:-/data_lake}
      PROCESSOR_STATE_PATH: ${PROCESSOR_STATE_PATH:-/state}
      PROCESSOR_LOG_LEVEL: ${PROCESSOR_LOG_LEVEL:-INFO}
      SCHEMA_STORE_PATH: ${SCHEMA_STORE_PATH:-/state/schemas.db}
      LINEAGE_REPORT_PATH: ${LINEAGE_REPORT_PATH:-/output/lineage_report.json}
      CONNECT_URL: http://connect:8083
    volumes:
      - ./data_lake:/data_lake
      - ./state:/state
      - ./output:/output
      - ./kafka-connect:/kafka-connect:ro
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f processor.py > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  mysql-data:
  kafka-data:
  zk-data:
  zk-log:

networks:
  default:
    name: cdc-network
    driver: bridge
